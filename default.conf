# Configuración de la memoria caché
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m inactive=60m;

upstream mis_backends {
    # Balanceo Round Robin entre dos nodos
    server apache1:80;
    server apache2:80;
}

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://mis_backends;
        
        # Activar caché (Fase 5)
        proxy_cache my_cache;
        proxy_cache_valid 200 10m;
        
        # Cabeceras para las capturas de pantalla de la entrega (Fase 2 y 5)
        add_header X-Proxy-Cache $upstream_cache_status; # Mostrará HIT o MISS
        add_header X-Servidor-Backend $upstream_addr;    # Mostrará qué apache responde
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}